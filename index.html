<!DOCTYPE html>
<html lang="es" data-theme="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>CurvaGo — Carreteras con curvas</title>
<meta name="description" content="Planificador de rutas con curvas para moto. Genera rutas circulares o a destino, guíate con voz y guarda tu historial.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CurvaGo">
<meta name="theme-color" content="#0e1116" id="themeColor">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel-2:#1d2530; --line:#2a3340;
    --ink:#eef2f7; --ink-dim:#9aa6b4; --ink-faint:#6b7686;
    --ignite:#ff7a18; --ignite-soft:#ff9d4d; --cool:#3ea6ff; --good:#36d399; --shadow:rgba(0,0,0,.55);
  }
  [data-theme="light"]{
    --bg:#eef1f5; --panel:#ffffff; --panel-2:#eef2f8; --line:#cfd8e3;
    --ink:#10151c; --ink-dim:#475467; --ink-faint:#7a8696; --shadow:rgba(40,60,90,.18);
  }
  @media (prefers-color-scheme: light){[data-theme="system"]{
    --bg:#eef1f5; --panel:#ffffff; --panel-2:#eef2f8; --line:#cfd8e3;
    --ink:#10151c; --ink-dim:#475467; --ink-faint:#7a8696; --shadow:rgba(40,60,90,.18);}}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%; margin:0}
  body{font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--ink);
    overflow:hidden; position:fixed; inset:0; font-size:16px; -webkit-text-size-adjust:100%}
  #map{position:absolute; inset:0; background:var(--bg); z-index:1}
  .leaflet-container{background:var(--bg); font-size:13px}
  .leaflet-control-attribution{font-size:10px; background:color-mix(in srgb,var(--bg) 72%,transparent); color:var(--ink-dim)}
  .leaflet-control-attribution a{color:var(--cool)}
  .leaflet-bar a{background:var(--panel)!important;color:var(--ink)!important;border-color:var(--line)!important;width:34px!important;height:34px!important;line-height:34px!important;font-size:20px!important}

  /* Header */
  .top{position:absolute; top:0; left:0; right:0; z-index:600; pointer-events:none;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(180deg, color-mix(in srgb,var(--bg) 92%,transparent) 55%, transparent)}
  .brand{font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.5px; font-size:26px; line-height:1; pointer-events:auto}
  .brand b{color:var(--ignite)}
  .brand i{font-style:normal;font-size:11px;font-weight:600;color:var(--ink-faint);margin-left:7px;letter-spacing:.3px}
  .gear{pointer-events:auto; width:42px;height:42px;border:1px solid var(--line);border-radius:12px;
    background:color-mix(in srgb,var(--panel) 92%,transparent); color:var(--ink-dim); font-size:20px;
    display:grid;place-items:center; cursor:pointer; position:relative; margin-left:auto}
  .gear .dot{position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;background:var(--ignite);display:none}
  .gear.upd .dot{display:block}

  /* Big guidance card (riding) */
  .nav{position:absolute;left:0;right:0;top:0;z-index:680;display:none;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 16px;
    background:linear-gradient(180deg,var(--ignite),color-mix(in srgb,var(--ignite) 72%,#000));color:#1a0f04}
  .nav.on{display:block}
  .nav .row{display:flex;align-items:center;gap:14px}
  .nav .ic{font-size:62px;font-weight:800;line-height:.9;min-width:64px;text-align:center}
  .nav .tx{font-weight:800;font-size:25px;line-height:1.05}
  .nav .tx span{display:block;font-weight:700;font-size:18px;opacity:.85;margin-top:2px}
  .nav .x{margin-left:auto;background:rgba(0,0,0,.2);border:none;color:#1a0f04;width:46px;height:46px;border-radius:12px;font-size:18px;cursor:pointer;align-self:flex-start}
  .nav .spd{margin-top:10px;font-weight:800;font-size:16px;opacity:.9}

  /* Floating recenter */
  .fab{position:absolute; z-index:600; right:14px; bottom:calc(var(--ph,150px) + 14px);
    width:50px;height:50px;border-radius:14px;border:1px solid var(--line);
    background:color-mix(in srgb,var(--panel) 92%,transparent); color:var(--ink-dim);
    display:grid;place-items:center;font-size:22px;cursor:pointer;backdrop-filter:blur(6px)}
  .fab.gps.live{border-color:var(--cool);color:var(--cool)}

  /* Bottom panel */
  .panel{position:absolute; left:0; right:0; bottom:0; z-index:700; background:var(--panel);
    border-top:1px solid var(--line); border-radius:20px 20px 0 0;
    padding:6px 16px calc(env(safe-area-inset-bottom) + 14px);
    box-shadow:0 -12px 44px var(--shadow); max-height:82vh; overflow:auto; -webkit-overflow-scrolling:touch}
  .grip{width:46px; height:5px; border-radius:99px; background:var(--line); margin:6px auto 12px}

  .big{width:100%; border:none; border-radius:16px; font-weight:800; font-size:18px; padding:18px; cursor:pointer; font-family:Inter,sans-serif; line-height:1.1}
  .big.primary{background:var(--ignite); color:#1a0f04}
  .big.primary:active{background:var(--ignite-soft)}
  .big.ghost{background:var(--panel-2); color:var(--ink); border:1px solid var(--line)}
  .big+.big{margin-top:10px}

  .seclabel{font-size:13px;font-weight:700;letter-spacing:.4px;color:var(--ink-dim);text-transform:uppercase;margin:14px 2px 8px}
  .wtitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;margin:2px 2px 4px}
  .opts{display:flex;gap:8px}
  .opts.col{flex-direction:column}
  .opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .opt{flex:1;min-height:52px;border:1.5px solid var(--line);background:var(--panel-2);color:var(--ink);
    border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;padding:8px 6px;line-height:1.15;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .opt small{font-size:11px;font-weight:600;color:var(--ink-faint)}
  .opt.on{border-color:var(--ignite);background:color-mix(in srgb,var(--ignite) 16%,transparent);color:var(--ink)}
  .opt.on small{color:var(--ignite-soft)}
  .stepper{display:flex;align-items:center;gap:12px}
  .stepper button{width:58px;height:58px;border-radius:14px;border:1.5px solid var(--line);background:var(--panel-2);color:var(--ink);font-size:30px;font-weight:700;cursor:pointer;line-height:1}
  .stepper button:active{border-color:var(--ignite);background:color-mix(in srgb,var(--ignite) 14%,transparent)}
  .kmval{flex:1;text-align:center}
  .kmval b{font-family:'Barlow Condensed',sans-serif;font-size:40px;line-height:1;color:var(--ink)}
  .kmval span{font-size:14px;color:var(--ink-faint);margin-left:5px}
  .wactions{display:flex;gap:10px;margin-top:16px}
  .wactions .big{margin-top:0}
  .whint{font-size:12.5px;color:var(--ink-faint);text-align:center;margin-top:10px;min-height:16px}
  .whint b{color:var(--cool)}

  /* Result summary */
  .rsum{display:flex;gap:8px;margin:6px 0 14px}
  .stat{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center}
  .stat .v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;line-height:1}
  .stat .v small{font-size:15px;color:var(--ink-dim)}
  .stat .l{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
  .stat.tw .v{color:var(--ignite-soft)}
  .ractions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .ractions button{min-height:50px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);border-radius:13px;font-size:14px;font-weight:700;cursor:pointer}
  .ractions button.wide{grid-column:1 / -1}

  /* Library */
  .tabs{display:flex;gap:8px;margin:6px 0 4px}
  .tabs button{flex:1;min-height:44px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-dim);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
  .tabs button.on{border-color:var(--ignite);color:var(--ink);background:color-mix(in srgb,var(--ignite) 13%,transparent)}
  .list{max-height:52vh;overflow:auto;-webkit-overflow-scrolling:touch;margin-top:6px}
  .item{display:flex;gap:12px;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line)}
  .item .ic{width:38px;height:38px;flex:0 0 auto;border-radius:11px;background:var(--panel-2);display:grid;place-items:center;font-size:18px;color:var(--ignite-soft)}
  .item .tx{flex:1;min-width:0;font-size:15px}
  .item .tx b{font-weight:700}
  .item .tx span{display:block;color:var(--ink-faint);font-size:12px;margin-top:2px}
  .item .act{display:flex;gap:6px}
  .item .act button{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-dim);font-size:15px;cursor:pointer}

  /* Settings menu */
  .menu{position:absolute; z-index:900; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:10px; box-shadow:0 14px 44px var(--shadow); display:none; width:min(320px,92vw); right:14px; top:calc(env(safe-area-inset-top) + 60px)}
  .menu.open{display:block}
  .menu h4{margin:8px 4px 8px; font-size:12px; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-faint)}
  .menu .row{display:flex;gap:8px;flex-wrap:wrap}
  .menu .row button{flex:1;min-height:46px;min-width:60px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);border-radius:11px;font-size:14px;font-weight:700;cursor:pointer}
  .menu .row button.sel{border-color:var(--ignite);background:color-mix(in srgb,var(--ignite) 15%,transparent)}
  .menu .mi{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);padding:13px 8px;border-radius:10px;font-size:15px;cursor:pointer}
  .menu .mi:active{background:var(--panel-2)}
  .seg{display:flex;align-items:center;justify-content:space-between;padding:11px 8px}
  .seg label{font-size:15px}
  .sw{width:48px;height:28px;border-radius:99px;background:var(--line);position:relative;cursor:pointer;transition:.2s;flex:0 0 auto}
  .sw.on{background:var(--ignite)}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
  .sw.on::after{left:23px}
  .ver{font-size:12px;color:var(--ink-faint);text-align:center;padding:10px 0 2px}
  .note{font-size:12px;color:var(--ink-faint);padding:6px 8px;line-height:1.4}
  .prog{height:7px;border-radius:99px;background:var(--line);margin:8px 4px;overflow:hidden;display:none}
  .prog.on{display:block}.prog>i{display:block;height:100%;width:0;background:var(--ignite);transition:width .2s}

  .toast{position:absolute;left:50%;bottom:calc(var(--ph,150px) + 24px);transform:translateX(-50%) translateY(16px);
    z-index:1000;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:12px 18px;border-radius:13px;font-size:14.5px;opacity:0;transition:.25s;pointer-events:none;max-width:88vw;text-align:center;box-shadow:0 8px 30px var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .leaflet-marker-icon.wp{filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  input[type=file]{display:none}
  .spin{width:16px;height:16px;border:2px solid #1a0f04;border-top-color:transparent;border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:4px}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* heading-up rotation + rider + speed */
  #map{transform:rotate(var(--rot,0deg));transform-origin:center center;transition:transform .25s ease}
  body.rot #map{top:-55%;left:-55%;width:210%;height:210%}
  .rwrap{width:32px;height:32px;display:grid;place-items:center}
  .rchev{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:26px solid var(--cool);filter:drop-shadow(0 1px 2px #06080b)}
  .spdbadge{position:absolute;z-index:660;left:14px;bottom:calc(var(--ph,150px) + 14px);display:none;
    background:color-mix(in srgb,var(--panel) 90%,transparent);border:1px solid var(--line);border-radius:16px;padding:8px 16px;text-align:center;backdrop-filter:blur(6px);box-shadow:0 6px 20px var(--shadow)}
  .spdbadge.on{display:block}
  .spdbadge b{font-family:'Barlow Condensed',sans-serif;font-size:42px;line-height:.85;color:var(--ink);display:block}
  .spdbadge span{font-size:11px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase}
  [hidden]{display:none!important}
</style>
</head>
<body>
<div id="map"></div>

<!-- Big riding guidance card -->
<div class="nav" id="nav">
  <div class="row">
    <div class="ic" id="nvIc">↑</div>
    <div class="tx" id="nvTx">—<span id="nvSub"></span></div>
    <button class="x" id="nvStop">■</button>
  </div>
  <div class="spd" id="nvSpd"></div>
</div>
<div class="spdbadge" id="spdBadge"><b>0</b><span>km/h</span></div>

<!-- Header -->
<div class="top">
  <div class="brand">Curva<b>Go</b><i id="brandVer"></i></div>
  <div class="gear" id="gearBtn">⚙<span class="dot"></span></div>
</div>

<div class="fab gps" id="btnGps" title="Centrar">◎</div>

<!-- Bottom panel -->
<div class="panel" id="panel">
  <div class="grip" id="grip"></div>

  <!-- IDLE -->
  <div class="screen" id="scIdle">
    <button class="big primary" id="goGenerate" data-i18n="gen_route">＋ Generar ruta</button>
    <button class="big ghost" id="goLibrary" data-i18n="my_rides">≣ Mis rutas</button>
    <button class="big ghost" id="goFreeRide" data-i18n="free_ride">● Grabar ruta libre</button>
  </div>

  <!-- WIZARD -->
  <div class="screen" id="scWizard" hidden>
    <div class="wtitle" data-i18n="w_title">Nueva ruta</div>

    <div class="seclabel" data-i18n="w_trip">Tipo de recorrido</div>
    <div class="opts" id="optTrip">
      <button class="opt on" data-trip="circular" data-i18n="trip_circular">⭮ Circular</button>
      <button class="opt" data-trip="round" data-i18n="trip_round">⇄ Ida y vuelta</button>
      <button class="opt" data-trip="oneway" data-i18n="trip_oneway">→ Solo ida</button>
    </div>

    <div class="seclabel" data-i18n="w_origin">Origen</div>
    <div class="opts" id="optOrigin">
      <button class="opt on" data-origin="gps" data-i18n="or_gps">📍 Mi ubicación</button>
      <button class="opt" data-origin="map" data-i18n="or_map">🗺 Elegir en el mapa</button>
    </div>

    <div id="distBlock">
      <div class="seclabel" data-i18n="w_dist">Distancia a recorrer</div>
      <div class="stepper">
        <button id="kmMinus">−</button>
        <div class="kmval"><b id="kmVal">100</b><span>km</span></div>
        <button id="kmPlus">+</button>
      </div>
    </div>

    <div id="destBlock" hidden>
      <div class="seclabel" data-i18n="w_dest">Destino</div>
      <div class="opts"><button class="opt" id="pickDest" data-i18n="de_map">🗺 Elegir destino en el mapa</button></div>
    </div>

    <div class="seclabel" data-i18n="w_level">Tipo de ruta</div>
    <div class="opts grid2" id="optLevel">
      <button class="opt" data-level="rapida" data-i18n="lvl_rapida">Rápida</button>
      <button class="opt" data-level="divertida" data-i18n="lvl_curvas">Curvas</button>
      <button class="opt on" data-level="sinuosa" data-i18n="lvl_sinuosa">Sinuosa</button>
      <button class="opt" data-level="extrema" data-i18n="lvl_extrema">Máxima diversión</button>
    </div>

    <div class="wactions">
      <button class="big ghost" id="wCancel" data-i18n="w_cancel">Cancelar</button>
      <button class="big primary" id="wGenerate" data-i18n="w_generate">Generar</button>
    </div>
    <div class="whint" id="wHint"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="scResult" hidden>
    <div class="rsum">
      <div class="stat"><div class="v" id="sDist">—</div><div class="l">km</div></div>
      <div class="stat"><div class="v" id="sTime">—</div><div class="l" data-i18n="sum_time">tiempo</div></div>
      <div class="stat tw"><div class="v" id="sTwist">—</div><div class="l" data-i18n="sum_twist">curvas</div></div>
    </div>
    <button class="big primary" id="startBtn" data-i18n="res_start">▶ Iniciar guiado</button>
    <div class="ractions">
      <button id="rOsm" data-i18n="res_osm">🔊 OsmAnd (voz)</button>
      <button id="rGmaps" data-i18n="res_gmaps">Google Maps</button>
      <button id="rSave" data-i18n="res_save">★ Guardar ruta</button>
      <button id="rNew" data-i18n="res_new">↺ Nueva ruta</button>
    </div>
  </div>

  <!-- LIBRARY -->
  <div class="screen" id="scLib" hidden>
    <div class="tabs">
      <button data-tab="plan" class="on" data-i18n="tab_plan">Planificadas</button>
      <button data-tab="done" data-i18n="tab_done">Realizadas</button>
    </div>
    <div class="list" id="list"></div>
    <button class="big ghost" id="libBack" data-i18n="back" style="margin-top:10px">← Volver</button>
  </div>
</div>

<!-- Settings -->
<div class="menu" id="setMenu">
  <h4 data-i18n="set_lang">Idioma</h4>
  <div class="row"><button data-lang="es">Español</button><button data-lang="en">English</button></div>
  <h4 data-i18n="set_theme">Tema</h4>
  <div class="row"><button data-theme="system" data-i18n="th_sys">Sistema</button><button data-theme="light" data-i18n="th_light">Claro</button><button data-theme="dark" data-i18n="th_dark">Oscuro</button></div>
  <h4 data-i18n="set_map">Mapa</h4>
  <div class="row"><button data-layer="cyclosm">CyclOSM</button><button data-layer="osm">OSM</button><button data-layer="topo">Topo</button></div>
  <button class="mi" id="dlArea" data-i18n="off_dl">⤓ Descargar esta zona (offline)</button>
  <div class="prog" id="dlProg"><i></i></div>
  <h4 data-i18n="set_opt">Opciones</h4>
  <div class="seg"><label data-i18n="set_wake">Mantener pantalla encendida</label><div class="sw" id="swWake"></div></div>
  <div class="seg"><label data-i18n="set_voice">Voz de guiado</label><div class="sw" id="swVoice"></div></div>
  <div class="seg"><label data-i18n="set_rotate">Rotar mapa (marcha)</label><div class="sw" id="swRotate"></div></div>
  <h4 data-i18n="set_data">Datos</h4>
  <button class="mi" id="backupExport" data-i18n="set_backup">⤓ Exportar copia de seguridad</button>
  <button class="mi" id="backupImport" data-i18n="set_restore">⤒ Restaurar copia</button>
  <div class="note" id="persistNote"></div>
  <button class="mi" id="checkUpd" data-i18n="set_update">↻ Buscar actualización</button>
  <div class="ver" id="verLine">CurvaGo</div>
</div>

<input type="file" id="fileInput" accept=".gpx,application/gpx+xml,text/xml">
<input type="file" id="backupFile" accept="application/json,.json">
<div class="toast" id="toast"></div>

<script>
/* ===========================================================================
   CurvaGo v1.2.0 — flujo guiado (Generar ruta → asistente → Iniciar).
   =========================================================================== */
const APP_VERSION='1.4.0';
const BR="https://brouter.de/brouter";
const $=s=>document.querySelector(s);

/* ---------- i18n ---------- */
const I18N={
 es:{gen_route:"＋ Generar ruta",my_rides:"≣ Mis rutas",free_ride:"● Grabar ruta libre",
  w_title:"Nueva ruta",w_trip:"Tipo de recorrido",trip_circular:"⭮ Circular",trip_round:"⇄ Ida y vuelta",trip_oneway:"→ Solo ida",
  w_origin:"Origen",or_gps:"📍 Mi ubicación",or_map:"🗺 Elegir en el mapa",
  w_dist:"Distancia a recorrer",w_dest:"Destino",de_map:"🗺 Elegir destino en el mapa",

/* ---------- Helpers ---------- */
function toast(m,ms=2600){const e=$('#toast');e.textContent=m;e.classList.add('show');clearTimeout(e._h);e._h=setTimeout(()=>e.classList.remove('show'),ms);}
function setPanelHeight(){document.documentElement.style.setProperty('--ph',($('#panel').offsetHeight||150)+'px');}
function show(name){['Idle','Wizard','Result','Lib'].forEach(s=>$('#sc'+s).hidden=(s!==name));panelMode=name;setTimeout(setPanelHeight,30);}
function wpIcon(label,color){return L.divIcon({className:'wp',html:
  `<div style="width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};border:2px solid var(--bg);display:grid;place-items:center;">
   <span style="transform:rotate(45deg);color:#1a0f04;font-weight:800;font-size:13px;font-family:Barlow Condensed">${label}</span></div>`,iconSize:[30,30],iconAnchor:[15,28]});}
function addWaypoint(ll){const m=L.marker(ll,{icon:wpIcon('?','#ff9d4d')}).addTo(map);waypoints.push({lat:ll.lat??ll[0],lng:ll.lng??ll[1],marker:m});colorWaypoints();}
function colorWaypoints(){waypoints.forEach((w,i)=>{const s=i===0,e=i===waypoints.length-1&&waypoints.length>1;
  if(w.marker)w.marker.setIcon(wpIcon(s?'S':e?'E':String(i),s?'#3ea6ff':e?'#ff7a18':'#ff9d4d'));});}

function bearing(a,b){const R=x=>x*Math.PI/180,y=Math.sin(R(b[0]-a[0]))*Math.cos(R(b[1]));
  const x=Math.cos(R(a[1]))*Math.sin(R(b[1]))-Math.sin(R(a[1]))*Math.cos(R(b[1]))*Math.cos(R(b[0]-a[0]));return(Math.atan2(y,x)*180/Math.PI+360)%360;}
function haversine(a,b){const R=6371,r=x=>x*Math.PI/180,dLat=r(b[1]-a[1]),dLon=r(b[0]-a[0]);
  const s=Math.sin(dLat/2)**2+Math.cos(r(a[1]))*Math.cos(r(b[1]))*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(s));}
function pathKm(c){let k=0;for(let i=1;i<c.length;i++)k+=haversine(c[i-1],c[i]);return k;}
function fmtDur(min){return min>=60?`${Math.floor(min/60)}h${String(min%60).padStart(2,'0')}`:`${min}min`;}
function curviness(co){if(co.length<3)return{score:0,label:'—',bpk:0};let bends=0,d=0;
  for(let i=1;i<co.length-1;i++){let a=bearing(co[i-1],co[i]),b=bearing(co[i],co[i+1]),x=Math.abs(b-a);if(x>180)x=360-x;if(x>18)bends++;d+=haversine(co[i-1],co[i]);}
  d+=haversine(co[co.length-2],co[co.length-1]);const bpk=d>0?bends/d:0,score=Math.max(0,Math.min(1,bpk/6));
  const L=bpk<1?(lang==='es'?'Suave':'Mild'):bpk<2.5?(lang==='es'?'Divert.':'Fun'):bpk<4?(lang==='es'?'Picante':'Spicy'):(lang==='es'?'Brutal':'Wild');
  return{score,label:L,bpk};}

async function generate(){

  if(wiz.origin==='map'&&!wiz.originPt){startPick('origin');return;}

  else{clearRouteOnly();addWaypoint(o);if(wiz.trip==='round'){addWaypoint(wiz.destPt);addWaypoint(o);}else addWaypoint(wiz.destPt);ok=await route();}

/* Coherent loop: origin sits on a ring; several well-spread vias make a real loop
   (no out-and-back), then we calibrate the radius to hit the requested distance. */
function ringWaypoints(o,Rkm,H,n){const C=dest(o,Rkm,H),oa=(H+180)%360,pts=[o];
  for(let i=1;i<n;i++){const ang=(oa+i*(360/n))%360,rr=Rkm*(0.85+Math.random()*0.3);pts.push(dest(C,rr,ang));}
  pts.push(o);return pts;}
async function generateCircularRoute(o,km,level){
  spinGen(true);
  try{
    await profileFor(level);const targetM=km*1000;
    // overshoot costs 3x → the loop tends to land AT or just BELOW the requested distance
    const cost=L=>L<=targetM?(targetM-L):(L-targetM)*3;
    let best=null,bestCost=1e15,bestPts=null,bestLL=null,calls=0;
    const seeds=[15,90,165,240,315].map(a=>a+Math.random()*40).sort(()=>Math.random()-.5);
    for(const H of seeds){
      let R=km/(2*Math.PI)/1.4;            // start short → approach from below
      for(let it=0;it<3&&calls<9;it++){
        const pts=ringWaypoints(o,R,H,6);
        const ll=pts.map(p=>`${p[1].toFixed(5)},${p[0].toFixed(5)}`).join('|');
        calls++;const fr=await fetchRoute(ll,level);
        if(!fr)break;
        const L=+fr.properties['track-length'];
        if(cost(L)<bestCost){bestCost=cost(L);best=fr;bestPts=pts;bestLL=ll;}
        if(L<=targetM&&(targetM-L)/targetM<0.12)break;   // good: just under target
        R*=Math.max(0.6,Math.min(1.7,targetM/L*0.98));
      }
      if(best&&bestCost<targetM*0.12)break;
    }
    if(!best){toast(t('t_route_fail'));return false;}
    clearRouteOnly();bestPts.slice(0,-1).forEach(p=>addWaypoint({lat:p[0],lng:p[1]}));
    setActiveRoute(best,level,bestLL);return true;
  }finally{spinGen(false);}
}
function dest(o,dKm,brg){const R=6371,r=x=>x*Math.PI/180,D=x=>x*180/Math.PI,br=r(brg),la=r(o[0]),lo=r(o[1]),d=dKm/R;
  const la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(br));
  const lo2=lo+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la),Math.cos(d)-Math.sin(la)*Math.sin(la2));return[D(la2),D(lo2)];}

/* ---------- Routing ---------- */
function spinGen(on){const b=$('#wGenerate');if(on){b.disabled=true;b.innerHTML='<span class="spin"></span>'+t('t_gen');}else{b.disabled=false;b.textContent=t('w_generate');}}
async function fetchRoute(ll,level){await profileFor(level);
  try{const r=await fetch(`${BR}?lonlats=${ll}&profile=${profileIds[level]||'moped'}&alternativeidx=0&format=geojson`);
    if(!r.ok)return null;const gj=await r.json();return(gj.features&&gj.features[0])?gj.features[0]:null;}catch(e){return null;}}
function setActiveRoute(fr,level,ll){routeData=fr;routeData._level=level;lastReq={ll,level};drawRoute(fr);}
async function route(){if(waypoints.length<2)return false;spinGen(true);
  try{const ll=waypoints.map(w=>`${w.lng.toFixed(5)},${w.lat.toFixed(5)}`).join('|');
    const fr=await fetchRoute(ll,mode);if(!fr){toast(t('t_route_fail'));return false;}
    setActiveRoute(fr,mode,ll);return true;}finally{spinGen(false);}}
function drawRoute(f){if(routeLine)map.removeLayer(routeLine);
  const ll=f.geometry.coordinates.map(c=>[c[1],c[0]]);
  const glow=L.polyline(ll,{color:'#ff7a18',weight:14,opacity:.16}),main=L.polyline(ll,{color:'#ff7a18',weight:6,opacity:.95});
  routeLine=L.layerGroup([glow,main]).addTo(map);routeLine._b=main.getBounds();map.fitBounds(main.getBounds(),{padding:[50,90]});}
function showResult(){
  const p=routeData.properties,km=(+p['track-length'])/1000,min=Math.round((+p['total-time'])/60),tw=curviness(routeData.geometry.coordinates);
  $('#sDist').innerHTML=km<100?km.toFixed(1):Math.round(km);
  $('#sTime').innerHTML=min>=60?`${Math.floor(min/60)}<small>h</small>${String(min%60).padStart(2,'0')}`:`${min}<small>m</small>`;
  $('#sTwist').textContent=tw.label;
  show('Result');collapsePanel(false);
}

document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&settings.wake&&(ride.on||guide.on))acquireWake();});

/* ---------- Voice guidance ---------- */
function parseGpxTurns(text){const xml=new DOMParser().parseFromString(text,'text/xml'),cues=[];
  [...xml.getElementsByTagName('rtept')].forEach(p=>{const tn=p.getElementsByTagName('turn')[0];if(!tn)return;
    cues.push({lat:+p.getAttribute('lat'),lon:+p.getAttribute('lon'),code:tn.textContent.trim()});});return cues;}
function turnPhrase(code){if(/^RN/.test(code)){const n=(code.match(/\d+/)||[''])[0];return t('v_rndb',{n});}
  const m={TL:'v_left',TR:'v_right',TSLL:'v_sleft',TSLR:'v_sright',TSHL:'v_shleft',TSHR:'v_shright',KL:'v_kleft',KR:'v_kright',TU:'v_uturn'};return m[code]?t(m[code]):'';}
function turnArrow(c){return{TL:'↰',TR:'↱',TSLL:'↖',TSLR:'↗',TSHL:'⤹',TSHR:'⤸',KL:'↰',KR:'↱',TU:'⟲',C:'↑'}[c]||(/^RN/.test(c)?'◉':'↑');}
function speak(txt){if(!settings.voice||!txt||!('speechSynthesis'in window))return;try{const u=new SpeechSynthesisUtterance(txt);u.lang=lang==='es'?'es-ES':'en-US';speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
async function startGuidance(){
  if(!routeData||!lastReq){toast(t('t_calc_first'));return;}
  guide.cues=[];guide.idx=0;
  try{const prof=await profileFor(lastReq.level);const r=await fetch(`${BR}?lonlats=${lastReq.ll}&profile=${prof}&alternativeidx=0&format=gpx`);if(r.ok)guide.cues=parseGpxTurns(await r.text());}catch(e){}
  guide.on=true;await acquireWake();
  $('#nav').classList.add('on');$('#nvIc').textContent='▶';$('#nvTx').firstChild.textContent=t('v_start');$('#nvSub').textContent='';speak(t('v_start'));
  if(me)makeRider(me);enterRotate();collapsePanel(true);startRecording(true);toast(t('t_guide_on'),3200);
}
function guidanceStep(pt){if(!guide.on)return;
  $('#nvSpd').textContent='';
  if(!guide.cues.length){$('#nvTx').firstChild.textContent='↑';return;}
  while(guide.idx<guide.cues.length){const c=guide.cues[guide.idx],d=haversine([pt[1],pt[0]],[c.lon,c.lat])*1000;
    if(d>300)break;
    const ph=turnPhrase(c.code);$('#nvIc').textContent=turnArrow(c.code);
    if(d<110){if(ph){$('#nvTx').firstChild.textContent=ph;$('#nvSub').textContent='';speak(ph);}guide.idx++;}
    else{if(ph){$('#nvTx').firstChild.textContent=ph;$('#nvSub').textContent=Math.round(d)+' m';}break;}}
  if(guide.idx>=guide.cues.length){$('#nvTx').firstChild.textContent=t('v_arrive');$('#nvIc').textContent='⚑';}}
function stopGuidance(){guide.on=false;$('#nav').classList.remove('on');$('#spdBadge').classList.remove('on');exitRotate();if(me)makeDot(me);try{speechSynthesis.cancel();}catch(e){}}

/* ---------- Nav view: heading-up rotation + speed ---------- */
let _hdg=0,_prevPt=null;
function smoothAngle(a,b){let d=b-a;while(d>180)d-=360;while(d<-180)d+=360;return((a+d*0.4)%360+360)%360;}
function setRot(deg){document.documentElement.style.setProperty('--rot',deg+'deg');}
function enterRotate(){if(!settings.rotate)return;document.body.classList.add('rot');setTimeout(()=>map.invalidateSize(),60);}
function exitRotate(){document.body.classList.remove('rot');setRot(0);_hdg=0;_prevPt=null;setTimeout(()=>map.invalidateSize(),60);}
function riderIcon(h){return L.divIcon({className:'rider',html:`<div class="rwrap" style="transform:rotate(${h}deg)"><div class="rchev"></div></div>`,iconSize:[32,32],iconAnchor:[16,16]});}
function makeRider(pt){if(meMarker)map.removeLayer(meMarker);meMarker=L.marker(pt,{icon:riderIcon(_hdg),zIndexOffset:1000,interactive:false}).addTo(map);}
function makeDot(pt){if(meMarker)map.removeLayer(meMarker);meMarker=L.circleMarker(pt,{radius:8,color:'#0b0e12',weight:2,fillColor:'#3ea6ff',fillOpacity:1}).addTo(map);}
function updateNavView(pt,coords){
  const spd=Math.max(0,(coords.speed||0)*3.6);
  let hdg=_hdg;
  if(coords.heading!=null&&!isNaN(coords.heading)&&spd>3)hdg=coords.heading;
  else if(_prevPt)hdg=bearing([_prevPt[1],_prevPt[0]],[pt[1],pt[0]]);
  _hdg=smoothAngle(_hdg,hdg);_prevPt=pt;
  if(guide.on){const sb=$('#spdBadge');sb.classList.add('on');sb.querySelector('b').textContent=Math.round(spd);
    if(settings.rotate){setRot(-_hdg);if(meMarker&&meMarker.setIcon)meMarker.setIcon(riderIcon(_hdg));map.setView(pt,map.getZoom(),{animate:false});}
    else map.panTo(pt,{animate:false});
  }else map.panTo(pt,{animate:false});
}
/* ---------- Recording ---------- */
function startRecording(silent){if(ride.on)return;if(!navigator.geolocation){toast(t('t_geo_no'));return;}
  ride={on:true,track:[],line:L.polyline([],{color:'#3ea6ff',weight:6}).addTo(map),dist:0,maxSpd:0,t0:Date.now(),speeds:[],watch:null};
  if(!silent){toast(t('t_ride_start'));show('Result');collapsePanel(true);}acquireWake();
  ride.watch=navigator.geolocation.watchPosition(p=>{const pt=[p.coords.latitude,p.coords.longitude];
    if(ride.track.length){const pr=ride.track[ride.track.length-1];ride.dist+=haversine([pr[1],pr[0]],[pt[1],pt[0]]);}
    ride.track.push(pt);ride.line.addLatLng(pt);
    const spd=(p.coords.speed||0)*3.6;if(spd>0)ride.speeds.push(spd);if(spd>ride.maxSpd)ride.maxSpd=spd;
    me=pt;if(meMarker&&meMarker.setLatLng)meMarker.setLatLng(pt);updateNavView(pt,p.coords);guidanceStep(pt);
  },()=>toast(t('t_gps_lost')),{enableHighAccuracy:true,maximumAge:1000});}
function stopRecording(){if(!ride.on)return;if(ride.watch!=null)navigator.geolocation.clearWatch(ride.watch);
  if(guide.on)stopGuidance();if(!settings.wake)releaseWake();
  const r0=ride;ride={on:false,watch:null,track:[],line:null,dist:0,maxSpd:0,t0:0,speeds:[]};
  const mins=Math.max(1,Math.round((Date.now()-r0.t0)/60000));
  if(r0.track.length>2){const avg=r0.dist/(((Date.now()-r0.t0)/3600000)||1),co=r0.track.map(p=>[p[1],p[0]]);
    const done=loadStore('curvago_done');done.unshift({id:Date.now(),date:new Date().toISOString(),km:+r0.dist.toFixed(1),min:mins,avg:Math.round(avg),max:Math.round(r0.maxSpd),twist:+curviness(co).bpk.toFixed(1),track:r0.track.map(p=>[+p[0].toFixed(5),+p[1].toFixed(5)])});
    saveStore('curvago_done',done.slice(0,100));toast(t('t_ride_saved'));}else toast(t('t_ride_stop'));
  if(panelMode==='Lib')renderLib();}

/* ---------- Hand-off ---------- */
async function buildGpx(){const prof=await profileFor(lastReq.level);const r=await fetch(`${BR}?lonlats=${lastReq.ll}&profile=${prof}&alternativeidx=0&format=gpx`);if(!r.ok)throw 0;return r.text();}
async function exportOsmAnd(){if(!lastReq){toast(t('t_calc_first'));return;}
  try{const gpx=await buildGpx(),file=new File([gpx],'curvago-osmand.gpx',{type:'application/gpx+xml'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'CurvaGo',text:'OsmAnd → Follow track'});toast(t('t_gpx_share'),3600);}
    else{download('curvago-osmand.gpx',gpx);toast(t('t_gpx_ready'),4200);}}catch(e){if(e&&e.name==='AbortError')return;toast(t('t_gpx_fail'));}}
function download(n,txt){const b=new Blob([txt],{type:'application/gpx+xml'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();}
function perp(p,a,b){const x=p[0],y=p[1],x1=a[0],y1=a[1],x2=b[0],y2=b[1],kx=Math.cos(y*Math.PI/180)*111,ky=111,dx=(x2-x1)*kx,dy=(y2-y1)*ky,L=dx*dx+dy*dy;
  if(L===0)return Math.hypot((x-x1)*kx,(y-y1)*ky);let tt=(((x-x1)*kx*dx)+((y-y1)*ky*dy))/L;tt=Math.max(0,Math.min(1,tt));return Math.hypot((x-x1)*kx-tt*dx,(y-y1)*ky-tt*dy);}
function dpKeep(p,eps){const k=new Array(p.length).fill(false);k[0]=k[p.length-1]=true;(function rec(s,e){let mx=0,id=-1;for(let i=s+1;i<e;i++){const d=perp(p[i],p[s],p[e]);if(d>mx){mx=d;id=i;}}if(mx>eps&&id>-1){k[id]=true;rec(s,id);rec(id,e);}})(0,p.length-1);return p.filter((_,i)=>k[i]);}
function shaping(co,mw){if(co.length<=mw+2)return co;let lo=0.02,hi=20,best=[co[0],co[co.length-1]];for(let i=0;i<22;i++){const e=(lo+hi)/2,s=dpKeep(co,e);if(s.length>mw+2)lo=e;else{best=s;hi=e;}}return best;}
function openGoogle(){if(!routeData){toast(t('t_calc_first'));return;}
  const pts=shaping(routeData.geometry.coordinates,9),f=p=>`${p[1].toFixed(5)},${p[0].toFixed(5)}`,vias=pts.slice(1,-1).map(f).join('|');
  let u=`https://www.google.com/maps/dir/?api=1&travelmode=driving&dir_action=navigate&origin=${f(pts[0])}&destination=${f(pts[pts.length-1])}`;
  if(vias)u+=`&waypoints=${encodeURIComponent(vias)}`;if(u.length>2048){toast(t('t_gmaps_long'));return;}
  toast(t('t_gmaps',{n:pts.length-2}));location.href=u;}

/* ---------- Offline ---------- */
function lon2x(lo,z){return Math.floor((lo+180)/360*Math.pow(2,z));}
function lat2y(la,z){return Math.floor((1-Math.log(Math.tan(la*Math.PI/180)+1/Math.cos(la*Math.PI/180))/Math.PI)/2*Math.pow(2,z));}
function tileUrl(z,x,y){const sd=['a','b','c'][(x+y)%3];if(curLayer==='cyclosm')return `https://${sd}.tile-cyclosm.openstreetmap.fr/cyclosm/${z}/${x}/${y}.png`;
  if(curLayer==='topo')return `https://${sd}.tile.opentopomap.org/${z}/${x}/${y}.png`;return `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;}
async function downloadArea(){const b=map.getBounds(),z0=Math.round(map.getZoom()),zmax=Math.min(z0+2,curLayer==='topo'?17:18);
  let urls=[];for(let z=z0;z<=zmax;z++){const x1=lon2x(b.getWest(),z),x2=lon2x(b.getEast(),z),y1=lat2y(b.getNorth(),z),y2=lat2y(b.getSouth(),z);
    for(let x=x1;x<=x2;x++)for(let y=y1;y<=y2;y++)urls.push(tileUrl(z,x,y));}
  if(urls.length>900){toast(t('t_dl_cap'));return;}
  const pr=$('#dlProg');pr.classList.add('on');pr.firstElementChild.style.width='0';toast(t('t_dl_busy'));
  let done=0;async function w(q){while(q.length){const u=q.pop();try{await fetch(u,{mode:'no-cors'});}catch(e){}done++;pr.firstElementChild.style.width=(done/urls.length*100)+'%';}}
  const q=urls.slice();await Promise.all(Array.from({length:6},()=>w(q)));pr.classList.remove('on');toast(t('t_dl_done',{n:urls.length}));}

/* ---------- Storage / library ---------- */
function loadStore(k){try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return[];}}
function saveStore(k,v){localStorage.setItem(k,JSON.stringify(v));}
function saveCurrentRoute(){if(!routeData||!lastReq){toast(t('t_calc_first'));return;}
  const km=(+routeData.properties['track-length'])/1000,min=Math.round((+routeData.properties['total-time'])/60),plan=loadStore('curvago_plan');
  plan.unshift({id:Date.now(),date:new Date().toISOString(),km:+km.toFixed(1),min,level:lastReq.level,twist:+curviness(routeData.geometry.coordinates).bpk.toFixed(1),ll:lastReq.ll,geo:routeData.geometry.coordinates.map(c=>[+c[1].toFixed(5),+c[0].toFixed(5)])});
  saveStore('curvago_plan',plan.slice(0,100));toast(t('t_saved'));}
function openLib(){show('Lib');collapsePanel(false);renderLib();}
function renderLib(){const box=$('#list');box.innerHTML='';
  $('#scLib').querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===libTab));
  const data=loadStore(libTab==='plan'?'curvago_plan':'curvago_done');
  if(!data.length){box.innerHTML=`<div class="item"><div class="ic">≣</div><div class="tx">${t(libTab==='plan'?'log_empty_plan':'log_empty_done')}</div></div>`;return;}
  data.forEach(it=>{const d=new Date(it.date).toLocaleDateString();
    const sub=libTab==='plan'?`${fmtDur(it.min)} · ${it.twist} ${t('curvas_km')} · ${levelLabel(it.level)} · ${d}`
      :`${fmtDur(it.min)} · ${t('ds_avg')} ${it.avg} · ${t('ds_max')} ${it.max} km/h · ${it.twist} ${t('curvas_km')} · ${d}`;
    const el=document.createElement('div');el.className='item';
    el.innerHTML=`<div class="ic">${libTab==='plan'?'★':'✓'}</div><div class="tx"><b>${it.km} km</b><span>${sub}</span></div>
      <div class="act"><button data-a="show">◵</button>${libTab==='plan'?'<button data-a="go">▶</button>':''}<button data-a="del">🗑</button></div>`;
    el.querySelector('[data-a="show"]').onclick=()=>showStored(it);
    const go=el.querySelector('[data-a="go"]');if(go)go.onclick=()=>{showStored(it);lastReq={ll:it.ll,level:it.level};showResult();};
    el.querySelector('[data-a="del"]').onclick=()=>{const a=loadStore(libTab==='plan'?'curvago_plan':'curvago_done').filter(x=>x.id!==it.id);saveStore(libTab==='plan'?'curvago_plan':'curvago_done',a);toast(t('t_deleted'));renderLib();};
    box.appendChild(el);});}
function showStored(it){if(routeLine)map.removeLayer(routeLine);const ll=it.geo||it.track;
  routeLine=L.polyline(ll,{color:libTab==='plan'?'#ff7a18':'#3ea6ff',weight:6}).addTo(map);map.fitBounds(routeLine.getBounds(),{padding:[50,90]});
  if(it.geo){const co=it.geo.map(p=>[p[1],p[0]]);routeData={geometry:{coordinates:co},properties:{'track-length':String(it.km*1000),'total-time':String(it.min*60)},_level:it.level};lastReq={ll:it.ll,level:it.level};}}

/* ---------- Backup ---------- */
function exportBackup(){const data={app:'CurvaGo',version:APP_VERSION,date:new Date().toISOString(),plan:loadStore('curvago_plan'),done:loadStore('curvago_done'),settings,lang};
  const b=new Blob([JSON.stringify(data)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='curvago-backup.json';a.click();toast(t('t_backup_ok'));}
function importBackup(text){try{const d=JSON.parse(text);if(d.plan)saveStore('curvago_plan',d.plan);if(d.done)saveStore('curvago_done',d.done);
  if(d.settings)Object.assign(settings,d.settings),saveSettings();if(d.lang){lang=d.lang;localStorage.setItem('curvago_lang',lang);}applyTheme();applyLang();toast(t('t_restore_ok'));}catch(e){toast(t('t_restore_fail'));}}

/* ---------- Clear ---------- */
function clearRouteOnly(){waypoints.forEach(w=>map.removeLayer(w.marker));waypoints=[];if(routeLine){map.removeLayer(routeLine);routeLine=null;}routeData=null;}
function resetAll(){clearRouteOnly();lastReq=null;Object.values(pickMarkers).forEach(m=>m&&map.removeLayer(m));pickMarkers={origin:null,dest:null};wiz.originPt=null;wiz.destPt=null;}

/* ---------- Panel collapse ---------- */
function collapsePanel(c){$('#panel').style.transform=c?'translateY(calc(100% - 64px))':'translateY(0)';setTimeout(setPanelHeight,260);}

/* ---------- Menus ---------- */
function closeMenus(){document.querySelectorAll('.menu').forEach(m=>m.classList.remove('open'));}
document.addEventListener('click',e=>{if(!e.target.closest('.menu')&&!e.target.closest('#gearBtn'))closeMenus();});

/* ---------- Service worker ---------- */
let waitingSW=null;
function setupSW(){if(!('serviceWorker'in navigator))return;
  navigator.serviceWorker.register('sw.js').then(reg=>{reg.addEventListener('updatefound',()=>{const nw=reg.installing;nw&&nw.addEventListener('statechange',()=>{
    if(nw.state==='installed'&&navigator.serviceWorker.controller){waitingSW=nw;$('#gearBtn').classList.add('upd');toast(t('t_upd_ready'),5000);}});});}).catch(()=>{});
  let rl=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(rl)return;rl=true;location.reload();});}
function checkUpdate(){if(!('serviceWorker'in navigator))return;navigator.serviceWorker.getRegistration().then(r=>{if(!r)return;r.update();setTimeout(()=>{if(!waitingSW)toast(t('t_upd_none'));},1500);});}

/* ---------- Wire ---------- */
$('#gearBtn').onclick=()=>{if($('#gearBtn').classList.contains('upd')&&waitingSW){waitingSW.postMessage('skipWaiting');return;}$('#setMenu').classList.toggle('open');};
$('#btnGps').onclick=()=>locate();
$('#goGenerate').onclick=()=>{resetAll();openWizard();};
$('#goLibrary').onclick=openLib;
$('#goFreeRide').onclick=()=>startRecording(false);
$('#libBack').onclick=()=>show('Idle');
/* wizard option groups */
$('#optTrip').onclick=e=>{const v=e.target.closest('[data-trip]');if(!v)return;wiz.trip=v.dataset.trip;syncWizard();updateWizHint();};
$('#optOrigin').onclick=e=>{const v=e.target.closest('[data-origin]');if(!v)return;wiz.origin=v.dataset.origin;syncWizard();if(wiz.origin==='map')startPick('origin');else{if(!me)locate(null,true);updateWizHint();}};
function setKm(v){wiz.km=Math.max(25,Math.min(400,v));$('#kmVal').textContent=wiz.km;}
$('#kmMinus').onclick=()=>setKm(wiz.km-25);
$('#kmPlus').onclick=()=>setKm(wiz.km+25);
$('#pickDest').onclick=()=>startPick('dest');
$('#optLevel').onclick=e=>{const v=e.target.closest('[data-level]');if(!v)return;wiz.level=v.dataset.level;syncWizard();};
$('#wCancel').onclick=()=>{resetAll();show('Idle');};
$('#wGenerate').onclick=generate;
/* result */
$('#startBtn').onclick=startGuidance;
$('#rOsm').onclick=exportOsmAnd;
$('#rGmaps').onclick=openGoogle;
$('#rSave').onclick=saveCurrentRoute;
$('#rNew').onclick=()=>{resetAll();openWizard();};
$('#nvStop').onclick=()=>{stopGuidance();stopRecording();show('Result');collapsePanel(false);};
/* lib tabs */
$('#scLib').querySelector('.tabs').onclick=e=>{const tb=e.target.dataset.tab;if(tb){libTab=tb;renderLib();}};
/* settings */
$('#setMenu').onclick=e=>{const L=e.target.dataset.lang,Th=e.target.dataset.theme,Ly=e.target.dataset.layer;
  if(L){lang=L;localStorage.setItem('curvago_lang',lang);applyLang();}
  if(Th){settings.theme=Th;saveSettings();applyTheme();syncSet();}
  if(Ly){Object.values(TILES).forEach(x=>map.removeLayer(x));TILES[Ly].addTo(map);curLayer=Ly;settings.layer=Ly;saveSettings();syncSet();}};
$('#dlArea').onclick=downloadArea;
$('#swWake').onclick=()=>{settings.wake=!settings.wake;saveSettings();syncSet();settings.wake?acquireWake():releaseWake();};
$('#swVoice').onclick=()=>{settings.voice=!settings.voice;saveSettings();syncSet();};
$('#swRotate').onclick=()=>{settings.rotate=!settings.rotate;saveSettings();syncSet();if(guide.on){settings.rotate?enterRotate():exitRotate();}};
$('#backupExport').onclick=exportBackup;
$('#backupImport').onclick=()=>$('#backupFile').click();
$('#backupFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>importBackup(rd.result);rd.readAsText(f);e.target.value='';};
$('#checkUpd').onclick=checkUpdate;
$('#fileInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>importGPX(rd.result);rd.readAsText(f);e.target.value='';};
let dragY=null,startT=0;
$('#grip').addEventListener('touchstart',e=>{dragY=e.touches[0].clientY;startT=$('#panel').style.transform;},{passive:true});
$('#grip').addEventListener('touchmove',e=>{if(dragY===null)return;const dy=e.touches[0].clientY-dragY;if(dy>40)collapsePanel(true);if(dy<-40)collapsePanel(false);},{passive:true});
$('#grip').addEventListener('touchend',()=>dragY=null);
$('#grip').onclick=()=>{const c=$('#panel').style.transform.includes('100%');collapsePanel(!c);};

function importGPX(text){try{const xml=new DOMParser().parseFromString(text,'text/xml');let n=[...xml.getElementsByTagName('trkpt')];if(!n.length)n=[...xml.getElementsByTagName('rtept')];
  if(!n.length){toast(t('t_route_fail'));return;}const ll=n.map(e=>[+e.getAttribute('lat'),+e.getAttribute('lon')]);if(routeLine)map.removeLayer(routeLine);
  routeLine=L.polyline(ll,{color:'#ff7a18',weight:6}).addTo(map);map.fitBounds(routeLine.getBounds(),{padding:[50,90]});
  const co=ll.map(p=>[p[1],p[0]]);routeData={geometry:{coordinates:co},properties:{'track-length':String(Math.round(pathKm(co)*1000)),'total-time':'0'}};showResult();toast(t('t_import',{n:n.length}));}catch(e){toast(t('t_route_fail'));}}

/* ---------- Startup ---------- */
applyTheme();applyLang();show('Idle');setPanelHeight();
matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change',applyTheme);
if(navigator.storage&&navigator.storage.persist){navigator.storage.persisted().then(p=>{if(p)$('#persistNote').textContent=t('t_persist_on');else navigator.storage.persist().then(g=>$('#persistNote').textContent=t(g?'t_persist_on':'t_persist_off'));});}
profileFor('sinuosa').then(id=>{if(id==='moped')toast(t('t_engine_fb'));});
setTimeout(()=>{if(navigator.geolocation)locate(null,true);},700);
if(settings.wake){/* acquired when guiding/recording */}
window.addEventListener('resize',setPanelHeight);
setupSW();
</script>
